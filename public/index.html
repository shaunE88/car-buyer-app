<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Buyer Assistant</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🚗</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-hero">
        <div class="header-content">
          <h1>🏎️ My Auto Shopper</h1>
          <p class="subtitle">Research, Evaluate, and Negotiate with Confidence</p>
        </div>
      </div>
    </header>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('research', event)">🔍 Research</button>
      <button class="tab-btn" onclick="switchTab('testDrive', event)">✅ Test Drive Guide</button>
      <button class="tab-btn" onclick="switchTab('negotiation', event)">💰 Price Negotiation</button>
    </div>

    <!-- Research Tab -->
    <div id="research" class="tab-content active">
      <h2>🔍 Research a Car</h2>
      
      <div id="researchInput">
        <div class="form-group">
          <label>Search Method</label>
          <select id="searchMethod" onchange="toggleSearchMethod()">
            <option value="details">By Make, Model, Year</option>
            <option value="vin">By VIN</option>
          </select>
        </div>

        <div id="detailsSearch">
          <div class="form-row">
            <div class="form-group">
              <label for="make">Make (Manufacturer)</label>
              <select id="make" onchange="updateModelDropdown('model', 'make')">
                <option value="">Select a Make...</option>
              </select>
            </div>
            <div class="form-group">
              <label for="model">Model</label>
              <select id="model">
                <option value="">Select Make First...</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="year">Year</label>
              <input type="number" id="year" placeholder="e.g., 2023" min="1900" max="2099">
            </div>
            <div class="form-group">
              <label for="mileage">Mileage</label>
              <input type="number" id="mileage" placeholder="e.g., 45000" min="0">
            </div>
          </div>
          <div class="form-group">
            <label for="zipCode">📍 Zip Code (Optional - to find local inventory)</label>
            <input type="text" id="zipCode" placeholder="e.g., 90210" maxlength="5" pattern="[0-9]{5}">
          </div>
        </div>

        <div id="vinSearch" style="display:none;">
          <div class="form-row">
            <div class="form-group">
              <label for="vin">VIN (17 characters)</label>
              <input type="text" id="vin" placeholder="e.g., WBADT43452G297186" maxlength="17">
            </div>
            <div class="form-group">
              <label for="vinMileage">Mileage</label>
              <input type="number" id="vinMileage" placeholder="e.g., 45000" min="0">
            </div>
          </div>
        </div>

        <button class="btn-submit" onclick="researchCar()">🔎 Research Car</button>
      </div>

      <div id="researchResults" class="results"></div>
    </div>

    <!-- Test Drive Tab -->
    <div id="testDrive" class="tab-content">
      <h2>✅ Test Drive Guide</h2>
      
      <div id="testDriveInput">
        <div class="form-row">
          <div class="form-group">
            <label for="tdMake">Make (Manufacturer)</label>
            <select id="tdMake" onchange="updateModelDropdown('tdModel', 'tdMake')">
              <option value="">Select a Make...</option>
            </select>
          </div>
          <div class="form-group">
            <label for="tdModel">Model</label>
            <select id="tdModel">
              <option value="">Select Make First...</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="tdYear">Year</label>
          <input type="number" id="tdYear" placeholder="e.g., 2023" min="1900" max="2099">
        </div>
        <button class="btn-submit" onclick="getTestDriveGuide()">📋 Get Test Drive Guide</button>
      </div>

      <div id="testDriveResults" class="results"></div>
    </div>

    <!-- Negotiation Tab -->
    <div id="negotiation" class="tab-content">
      <h2>💰 Price Negotiation Strategy</h2>
      
      <div id="negotiationInput">
        <div class="form-row">
          <div class="form-group">
            <label for="negMake">Make (Manufacturer)</label>
            <select id="negMake" onchange="updateModelDropdown('negModel', 'negMake')">
              <option value="">Select a Make...</option>
            </select>
          </div>
          <div class="form-group">
            <label for="negModel">Model</label>
            <select id="negModel">
              <option value="">Select Make First...</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="negYear">Year</label>
            <input type="number" id="negYear" placeholder="e.g., 2023" min="1900" max="2099">
          </div>
          <div class="form-group">
            <label for="negMileage">Mileage</label>
            <input type="number" id="negMileage" placeholder="e.g., 45000" min="0">
          </div>
        </div>
        <div class="form-group">
          <label for="sellingPrice">Asking Price ($)</label>
          <input type="number" id="sellingPrice" placeholder="e.g., 28500" min="0" step="100">
        </div>
        <button class="btn-submit" onclick="getNegotiationStrategy()">💬 Get Strategy</button>
      </div>

      <div id="negotiationResults" class="results"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
